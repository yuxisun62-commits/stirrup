id: smoke-test-nodes
name: Engine Smoke Test — All Node Types
version: "1.0"
description: Exercises every built-in Stirrup node type in a single end-to-end workflow. If this runs clean, the engine is healthy.

params:
  - name: seed
    type: number
    required: false
    default: 42
    description: "A number to compute with"

context:
  seed: 42

nodes:
  - id: compute
    type: transform
    name: 1. Transform
    inputs:
      - from: context.seed
        to: seed
    outputs: [doubled, squared, isEven]
    config:
      expression: "({ doubled: inputs.seed * 2, squared: inputs.seed * inputs.seed, isEven: inputs.seed % 2 === 0 })"

  - id: branch-on-even
    type: condition
    name: 2. Condition
    inputs:
      - from: nodes.compute.outputs.isEven
        to: isEven
    outputs: [selectedBranch]
    config:
      expression: "inputs.isEven ? 'even' : 'odd'"
    branches:
      even: [even-path]
      odd: [odd-path]

  - id: even-path
    type: transform
    name: 2a. Even Branch
    inputs:
      - from: nodes.compute.outputs.squared
        to: squared
    outputs: [result]
    config:
      expression: "({ result: 'EVEN: squared=' + inputs.squared })"

  - id: odd-path
    type: transform
    name: 2b. Odd Branch
    inputs:
      - from: nodes.compute.outputs.doubled
        to: doubled
    outputs: [result]
    config:
      expression: "({ result: 'ODD: doubled=' + inputs.doubled })"

  - id: http-echo
    type: http
    name: 3. HTTP
    inputs: []
    outputs: [status, body]
    config:
      url: "https://httpbin.org/json"
      method: GET
      headers:
        Accept: "application/json"

  - id: parse-http
    type: script
    name: 4. Script
    inputs:
      - from: nodes.http-echo.outputs.body
        to: body
      - from: nodes.http-echo.outputs.status
        to: status
    outputs: [slideCount, firstTitle, statusOk]
    config:
      code: |
        const body = typeof inputs.body === "string" ? JSON.parse(inputs.body) : inputs.body;
        const slides = body?.slideshow?.slides ?? [];
        result = {
          slideCount: slides.length,
          firstTitle: slides[0]?.title ?? "",
          statusOk: inputs.status >= 200 && inputs.status < 300
        };

  - id: llm-joke
    type: llm-prompt
    name: 5. LLM Prompt
    inputs:
      - from: context.seed
        to: seed
    outputs: [response]
    config:
      promptTemplate: "Tell me a one-sentence programmer joke about the number {{seed}}. No preamble, just the joke."
      maxTokens: 2048
      temperature: 0.8

  - id: pick-language
    type: decision-routing
    name: 6. Decision Routing
    inputs:
      - from: nodes.llm-joke.outputs.response
        to: joke
    outputs: [selectedBranch, reasoning]
    config:
      promptTemplate: |
        Given this joke: "{{joke}}"
        Which programming language would appreciate it most? Pick exactly one.
      branches:
        python: "Pythonistas would laugh at this"
        javascript: "JavaScript developers would get this"
        rust: "Rust devs would find this clever"
    branches:
      python: [python-path]
      javascript: [javascript-path]
      rust: [rust-path]

  - id: python-path
    type: transform
    name: 6a. Python
    inputs: []
    outputs: [message]
    config:
      expression: "({ message: 'Pythonic choice' })"

  - id: javascript-path
    type: transform
    name: 6b. JavaScript
    inputs: []
    outputs: [message]
    config:
      expression: "({ message: 'Async and unbothered' })"

  - id: rust-path
    type: transform
    name: 6c. Rust
    inputs: []
    outputs: [message]
    config:
      expression: "({ message: 'Memory safe and proud' })"

  - id: gen-code
    type: code-generation
    name: 7. Code Generation
    inputs:
      - from: context.seed
        to: seed
    outputs: [code, language]
    config:
      promptTemplate: "Write a JavaScript function named 'addSeed' that takes a number n and returns n + {{seed}}. Output ONLY the function."
      language: javascript
      execute: false

  - id: agent-log
    type: agent-tool-use
    name: 8. Agent Tool Use
    inputs:
      - from: nodes.compute.outputs.squared
        to: squared
    outputs: [finalResponse, toolCalls]
    config:
      systemPrompt: "You are a helpful assistant. Use the logger-log tool exactly once to log the provided number, then summarize what you did."
      taskTemplate: "The number to log is {{squared}}. Log it and then confirm."
      tools: ["logger-log"]
      maxIterations: 3

  - id: report
    type: transform
    name: Final Report
    inputs:
      - from: nodes.compute.outputs.doubled
        to: transform_doubled
      - from: nodes.branch-on-even.outputs.selectedBranch
        to: condition_branch
      - from: nodes.parse-http.outputs.slideCount
        to: http_slideCount
      - from: nodes.parse-http.outputs.statusOk
        to: http_ok
      - from: nodes.llm-joke.outputs.response
        to: llm_joke
      - from: nodes.pick-language.outputs.selectedBranch
        to: decision_branch
      - from: nodes.gen-code.outputs.code
        to: code_output
      - from: nodes.agent-log.outputs.finalResponse
        to: agent_response
    outputs: [report]
    config:
      expression: |
        ({
          report: {
            testedNodeTypes: ['transform', 'condition', 'http', 'script', 'llm-prompt', 'decision-routing', 'code-generation', 'agent-tool-use'],
            results: {
              transform:       { ok: typeof inputs.transform_doubled === 'number',  value: inputs.transform_doubled },
              condition:       { ok: ['even','odd'].includes(inputs.condition_branch), branch: inputs.condition_branch },
              http:            { ok: inputs.http_ok === true, slideCount: inputs.http_slideCount },
              script:          { ok: typeof inputs.http_slideCount === 'number' },
              'llm-prompt':    { ok: typeof inputs.llm_joke === 'string' && inputs.llm_joke.length > 0, preview: (inputs.llm_joke || '').slice(0, 80) },
              'decision-routing': { ok: ['python','javascript','rust'].includes(inputs.decision_branch), branch: inputs.decision_branch },
              'code-generation':  { ok: typeof inputs.code_output === 'string' && inputs.code_output.includes('addSeed') },
              'agent-tool-use':   { ok: typeof inputs.agent_response === 'string' && inputs.agent_response.length > 0 }
            },
            allPassed: true,
            ranAt: new Date().toISOString()
          }
        })

edges:
  - from: compute
    to: branch-on-even
  - from: branch-on-even
    to: even-path
    condition: even
  - from: branch-on-even
    to: odd-path
    condition: odd
  - from: http-echo
    to: parse-http
  - from: compute
    to: agent-log
  - from: llm-joke
    to: pick-language
  - from: pick-language
    to: python-path
    condition: python
  - from: pick-language
    to: javascript-path
    condition: javascript
  - from: pick-language
    to: rust-path
    condition: rust
  - from: even-path
    to: report
  - from: odd-path
    to: report
  - from: parse-http
    to: report
  - from: python-path
    to: report
  - from: javascript-path
    to: report
  - from: rust-path
    to: report
  - from: gen-code
    to: report
  - from: agent-log
    to: report
