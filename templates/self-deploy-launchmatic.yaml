id: self-deploy-launchmatic
name: Deploy This Workflow to Launchmatic
version: "1.0"
description: Package the current Stirrup workflow as a standalone service and deploy it to Launchmatic for persistent hosting

params:
  - name: workflowFile
    type: string
    required: true
    description: "Path to the workflow YAML file to deploy"
  - name: projectSlug
    type: string
    required: true
    description: "Launchmatic project slug"
  - name: serviceName
    type: string
    required: true
    description: "Name for the deployed service"
  - name: lmToken
    type: string
    required: true
    description: "Launchmatic API token"
    service: launchmatic
  - name: anthropicKey
    type: string
    required: true
    description: "Anthropic API key for AI nodes in the deployed workflow"
    service: anthropic
  - name: stirrupVersion
    type: string
    description: "Version of stirrup-ai to pin in the generated package.json. The UI injects the host version; CLI users can set `^0.7.0` or similar."
    default: "latest"
  - name: slackToken
    type: string
    description: "Optional: Slack token to notify on deploy"
    service: slack
  - name: slackChannel
    type: string
    default: "#deployments"
    description: "Slack channel for deploy notification"

nodes:
  - id: read-workflow
    type: fs-read
    name: Read Workflow File
    inputs:
      - from: context.workflowFile
        to: path
    outputs: [content, path, size]
    config: {}

  - id: generate-server
    type: llm-prompt
    name: Generate Server Code
    inputs:
      - from: nodes.read-workflow.outputs.content
        to: workflowYaml
      - from: context.serviceName
        to: name
    outputs: [response]
    config:
      # The prompt is pinned to ES module syntax because the generated
      # file runs in a package.json with "type": "module". Any CJS
      # (`require`, `module.exports`) would throw "require is not
      # defined" at runtime — this used to happen when the LLM's
      # default bias toward CJS leaked through.
      promptTemplate: |
        Generate a complete Node.js server (ES module — NO `require`) that runs this Stirrup workflow as an HTTP service.

        Workflow YAML:
        {{workflowYaml}}

        Requirements:
        - ES MODULE SYNTAX ONLY. Use `import ... from "..."`. Never use `require()`, `module.exports`, or `__dirname` directly (derive via `fileURLToPath(import.meta.url)` if needed).
        - Import the engine via `import { WorkflowEngine, ... } from "stirrup-ai"`. The package name is stirrup-ai, NOT stirrup.
        - Use Express (`import express from "express"`) on port from PORT env var (default 3000).
        - Register the built-in node handlers plus AI handlers when ANTHROPIC_API_KEY is set.
        - Load the workflow from `./workflow.yaml` via engine.loadWorkflow().
        - POST /run — execute with request body as context params.
        - GET /health — health check.
        - GET /status/:id — execution status via engine.getState().
        - Wrap handlers in try/catch and return HTTP 400 with the error message on failure.

        Return ONLY the JavaScript source, no markdown fencing, no explanations.
      systemPrompt: "Generate production-ready Node.js ES module server code. Never emit CommonJS. Never use require(). The package name is stirrup-ai."
      maxTokens: 4096

  - id: compose-paths
    type: transform
    name: Compose Output Paths
    inputs:
      - from: context.serviceName
        to: name
    outputs: [dir, serverPath, packagePath, dockerPath, envPath, workflowPath]
    config:
      expression: |
        ({
          dir:          '.deploy-' + inputs.name,
          serverPath:   '.deploy-' + inputs.name + '/server.js',
          packagePath:  '.deploy-' + inputs.name + '/package.json',
          dockerPath:   '.deploy-' + inputs.name + '/Dockerfile',
          envPath:      '.deploy-' + inputs.name + '/.env',
          workflowPath: '.deploy-' + inputs.name + '/workflow.yaml'
        })

  - id: generate-package
    type: transform
    name: Generate package.json
    inputs:
      - from: context.serviceName
        to: name
      - from: context.stirrupVersion
        to: stirrupVersion
    outputs: [packageJson]
    config:
      # stirrupVersion comes from the DeployPanel (current host version)
      # or falls through to "latest" for CLI usage. Pinning to a
      # nonexistent version like "^0.1.0" was the root cause of the
      # earlier "require is not defined" failures — the install landed
      # an unrelated package, then the ESM/CJS bridge surfaced as that
      # error.
      expression: |
        ({
          packageJson: JSON.stringify({
            name: inputs.name,
            version: '1.0.0',
            type: 'module',
            scripts: { start: 'node server.js' },
            dependencies: {
              'stirrup-ai': inputs.stirrupVersion || 'latest',
              'express': '^5.2.1'
            }
          }, null, 2)
        })

  - id: generate-dockerfile
    type: transform
    name: Generate Dockerfile
    inputs: []
    outputs: [dockerfile]
    config:
      expression: |
        ({
          dockerfile: 'FROM node:20-slim\nWORKDIR /app\nCOPY package.json ./\nRUN npm install --production\nCOPY . .\nEXPOSE 3000\nCMD ["node", "server.js"]'
        })

  - id: generate-env
    type: transform
    name: Generate .env
    inputs:
      - from: context.anthropicKey
        to: anthropicKey
    outputs: [envContents]
    config:
      expression: |
        ({
          envContents: 'ANTHROPIC_API_KEY=' + (inputs.anthropicKey || '') + '\nPORT=3000\n'
        })

  # The previous revision did all five writes in a single `script` node
  # via `const fs = require('fs')`. Our ScriptNode sandbox intentionally
  # doesn't expose `require`, so the node threw "ReferenceError: require
  # is not defined" on every deploy. Five `fs-write` plugin nodes use
  # the real filesystem API and each auto-creates its parent directory
  # (createDirs defaults on).

  - id: write-server-file
    type: fs-write
    name: Write server.js
    inputs:
      - from: nodes.compose-paths.outputs.serverPath
        to: path
      - from: nodes.generate-server.outputs.response
        to: content
    outputs: [path, size, written]
    config: {}

  - id: write-package-file
    type: fs-write
    name: Write package.json
    inputs:
      - from: nodes.compose-paths.outputs.packagePath
        to: path
      - from: nodes.generate-package.outputs.packageJson
        to: content
    outputs: [path, size, written]
    config: {}

  - id: write-docker-file
    type: fs-write
    name: Write Dockerfile
    inputs:
      - from: nodes.compose-paths.outputs.dockerPath
        to: path
      - from: nodes.generate-dockerfile.outputs.dockerfile
        to: content
    outputs: [path, size, written]
    config: {}

  - id: write-env-file
    type: fs-write
    name: Write .env
    inputs:
      - from: nodes.compose-paths.outputs.envPath
        to: path
      - from: nodes.generate-env.outputs.envContents
        to: content
    outputs: [path, size, written]
    config: {}

  - id: write-workflow-file
    type: fs-write
    name: Write workflow.yaml
    inputs:
      - from: nodes.compose-paths.outputs.workflowPath
        to: path
      - from: nodes.read-workflow.outputs.content
        to: content
    outputs: [path, size, written]
    config: {}

  - id: create-service
    type: lm-create-service
    name: Create Launchmatic Service
    inputs:
      - from: context.projectSlug
        to: projectSlug
      - from: context.serviceName
        to: name
      - from: context.lmToken
        to: token
    outputs: [serviceId, name, status]
    config:
      runtime: "docker"

  - id: format-env
    type: transform
    name: Prepare Env Vars
    inputs:
      - from: context.anthropicKey
        to: anthropicKey
    outputs: [variables]
    config:
      expression: |
        ({
          variables: {
            ANTHROPIC_API_KEY: inputs.anthropicKey,
            PORT: '3000',
            NODE_ENV: 'production'
          }
        })

  - id: set-env-vars
    type: lm-env-set
    name: Set Environment Variables
    inputs:
      - from: nodes.create-service.outputs.serviceId
        to: serviceId
      - from: context.lmToken
        to: token
      - from: nodes.format-env.outputs.variables
        to: variables
    outputs: [set, count]
    config: {}

  - id: deploy
    type: lm-deploy
    name: Deploy to Launchmatic
    inputs:
      - from: nodes.create-service.outputs.serviceId
        to: serviceId
      - from: context.lmToken
        to: token
    outputs: [deploymentId, status, url]
    config: {}

  - id: wait-deploy
    type: delay
    name: Wait for Deployment
    inputs: []
    outputs: [passthrough]
    config:
      seconds: 30

  - id: verify
    type: lm-browser-test
    name: Verify Deployment
    inputs:
      - from: nodes.deploy.outputs.url
        to: url
    outputs: [passed, status, loadTimeMs]
    config:
      timeout: 30000

  - id: build-result
    type: transform
    name: Build Result Summary
    inputs:
      - from: nodes.deploy.outputs.url
        to: url
      - from: nodes.deploy.outputs.deploymentId
        to: deploymentId
      - from: nodes.create-service.outputs.serviceId
        to: serviceId
      - from: nodes.verify.outputs.passed
        to: verified
      - from: context.serviceName
        to: name
    outputs: [result]
    config:
      expression: |
        ({
          result: {
            serviceName: inputs.name,
            serviceId: inputs.serviceId,
            deploymentId: inputs.deploymentId,
            url: inputs.url,
            runEndpoint: inputs.url + '/run',
            healthEndpoint: inputs.url + '/health',
            verified: inputs.verified,
            deployedAt: new Date().toISOString(),
            usage: 'curl -X POST ' + inputs.url + '/run -H "Content-Type: application/json" -d \'{"param": "value"}\''
          }
        })

  - id: check-notify
    type: condition
    name: Should Notify Slack?
    inputs:
      - from: context.slackToken
        to: token
    outputs: [selectedBranch]
    config:
      expression: "inputs.token ? 'yes' : 'no'"
    branches:
      yes: [format-slack]
      no: []

  - id: format-slack
    type: transform
    name: Format Slack Message
    inputs:
      - from: nodes.build-result.outputs.result
        to: result
    outputs: [text]
    config:
      expression: |
        ({
          text: ':cloud: *Workflow deployed to Launchmatic!*\n\n' +
            '> *Service:* ' + inputs.result.serviceName + '\n' +
            '> *URL:* ' + inputs.result.url + '\n' +
            '> *Run endpoint:* `POST ' + inputs.result.runEndpoint + '`\n' +
            '> *Health:* ' + inputs.result.healthEndpoint + '\n' +
            '> *Verified:* ' + (inputs.result.verified ? ':white_check_mark: Yes' : ':warning: Check manually') + '\n\n' +
            '```' + inputs.result.usage + '```'
        })

  - id: notify-slack
    type: slack-send
    name: Notify Deployment
    inputs:
      - from: context.slackToken
        to: token
      - from: context.slackChannel
        to: channel
      - from: nodes.format-slack.outputs.text
        to: text
    outputs: [messageTs]
    config: {}

edges:
  - from: read-workflow
    to: generate-server
  - from: read-workflow
    to: compose-paths
  - from: compose-paths
    to: write-server-file
  - from: generate-server
    to: write-server-file
  - from: compose-paths
    to: write-package-file
  - from: generate-package
    to: write-package-file
  - from: compose-paths
    to: write-docker-file
  - from: generate-dockerfile
    to: write-docker-file
  - from: compose-paths
    to: write-env-file
  - from: generate-env
    to: write-env-file
  - from: compose-paths
    to: write-workflow-file
  - from: read-workflow
    to: write-workflow-file
  - from: write-server-file
    to: create-service
  - from: write-package-file
    to: create-service
  - from: write-docker-file
    to: create-service
  - from: write-env-file
    to: create-service
  - from: write-workflow-file
    to: create-service
  - from: create-service
    to: format-env
  - from: format-env
    to: set-env-vars
  - from: set-env-vars
    to: deploy
  - from: deploy
    to: wait-deploy
  - from: wait-deploy
    to: verify
  - from: verify
    to: build-result
  - from: deploy
    to: build-result
  - from: create-service
    to: build-result
  - from: build-result
    to: check-notify
  - from: check-notify
    to: format-slack
    condition: yes
  - from: format-slack
    to: notify-slack
