id: repo-health-broadcast
name: Weekly Repo Health → LinkedIn + Slack
version: "1.0"
description: Fetch GitHub repo stats (stars, forks, recent PRs, issues), have Claude write a "state of the project" update, generate a branded stats image via Replicate, then post to LinkedIn and Slack. Great for open-source maintainers who want to build in public.
params:
  - name: repo
    type: string
    required: true
    description: GitHub repository (owner/repo)
    picker: github-repo
  - name: githubToken
    type: string
    required: true
    service: github
  - name: replicateToken
    type: string
    required: true
    service: replicate
  - name: linkedinToken
    type: string
    required: false
    service: linkedin
  - name: slackToken
    type: string
    required: false
    service: slack
  - name: slackChannel
    type: string
    required: false
    default: "#general"
context:
  slackChannel: "#general"
nodes:
  - id: fetch-repo
    type: http
    name: Fetch Repo Info
    inputs:
      - from: context.repo
        to: repo
      - from: context.githubToken
        to: token
    outputs:
      - status
      - body
    config:
      url: https://api.github.com/repos/{{repo}}
      method: GET
      headers:
        Authorization: Bearer {{token}}
        Accept: application/vnd.github+json
  - id: fetch-prs
    type: http
    name: Fetch Recent PRs
    inputs:
      - from: context.repo
        to: repo
      - from: context.githubToken
        to: token
    outputs:
      - status
      - body
    config:
      url: https://api.github.com/repos/{{repo}}/pulls?state=all&sort=updated&per_page=10
      method: GET
      headers:
        Authorization: Bearer {{token}}
        Accept: application/vnd.github+json
  - id: fetch-issues
    type: http
    name: Fetch Recent Issues
    inputs:
      - from: context.repo
        to: repo
      - from: context.githubToken
        to: token
    outputs:
      - status
      - body
    config:
      url: https://api.github.com/repos/{{repo}}/issues?state=all&sort=updated&per_page=10
      method: GET
      headers:
        Authorization: Bearer {{token}}
        Accept: application/vnd.github+json
  - id: aggregate
    type: script
    name: Aggregate Stats
    inputs:
      - from: nodes.fetch-repo.outputs.body
        to: repo
      - from: nodes.fetch-prs.outputs.body
        to: prs
      - from: nodes.fetch-issues.outputs.body
        to: issues
    outputs:
      - stats
    config:
      code: |
        const repo = typeof inputs.repo === "string" ? JSON.parse(inputs.repo) : inputs.repo;
        const prs = typeof inputs.prs === "string" ? JSON.parse(inputs.prs) : (inputs.prs || []);
        const issues = typeof inputs.issues === "string" ? JSON.parse(inputs.issues) : (inputs.issues || []);
        const now = Date.now();
        const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
        const recentPRs = prs.filter(p => new Date(p.updated_at).getTime() > weekAgo);
        const recentIssues = issues.filter(i => !i.pull_request && new Date(i.updated_at).getTime() > weekAgo);
        result = {
          stats: {
            name: repo.full_name || "",
            description: repo.description || "",
            stars: repo.stargazers_count || 0,
            forks: repo.forks_count || 0,
            openIssues: repo.open_issues_count || 0,
            language: repo.language || "Unknown",
            recentPRCount: recentPRs.length,
            mergedPRs: recentPRs.filter(p => p.merged_at).length,
            recentIssueCount: recentIssues.length,
            closedIssues: recentIssues.filter(i => i.state === "closed").length,
            topPR: recentPRs[0]?.title || "none",
            topIssue: recentIssues[0]?.title || "none"
          }
        };
  - id: write-update
    type: llm-prompt
    name: Write Weekly Update
    inputs:
      - from: nodes.aggregate.outputs.stats
        to: stats
    outputs:
      - response
    config:
      promptTemplate: |
        Write a "building in public" weekly update for this open-source repo.

        Stats: {{stats}}

        Output JSON:
        {
          "linkedinPost": "A LinkedIn post (900-1300 chars). Share the stats naturally — don't just list numbers. Add one insight about the trend. End with 3-4 hashtags.",
          "slackMessage": "A Slack mrkdwn message (under 800 chars). Key stats with bold labels. One-line takeaway.",
          "imagePrompt": "An AI image prompt for a clean dark-background stats card showing: repo name, stars, forks, PRs merged this week, issues closed. Modern developer aesthetic, no real text in the image — just the visual layout and vibe."
        }
      responseFormat: json
      maxTokens: 4096
      temperature: 0.6
  - id: parse-update
    type: script
    name: Parse Update
    inputs:
      - from: nodes.write-update.outputs.response
        to: response
    outputs:
      - linkedinPost
      - slackMessage
      - imagePrompt
    config:
      code: |
        let p = inputs.response;
        if (typeof p === "string") p = JSON.parse(p.replace(/^```json?\s*/i,"").replace(/\s*```$/,""));
        result = {
          linkedinPost: p.linkedinPost || "",
          slackMessage: p.slackMessage || "",
          imagePrompt: p.imagePrompt || "developer stats dashboard dark theme"
        };
  - id: generate-card
    type: replicate-image
    name: Generate Stats Card
    inputs:
      - from: nodes.parse-update.outputs.imagePrompt
        to: prompt
      - from: context.replicateToken
        to: apiToken
    outputs:
      - firstImageUrl
    config:
      aspectRatio: 16:9
  - id: post-linkedin
    type: linkedin-create-post
    name: Post to LinkedIn
    inputs:
      - from: context.linkedinToken
        to: accessToken
      - from: nodes.parse-update.outputs.linkedinPost
        to: text
    outputs:
      - postId
      - postUrl
    config: {}
  - id: post-slack
    type: slack-send
    name: Post to Slack
    inputs:
      - from: context.slackToken
        to: token
      - from: context.slackChannel
        to: channel
      - from: nodes.parse-update.outputs.slackMessage
        to: text
    outputs:
      - messageTs
    config:
      text: ""
      channel: ""
      token: ""
  - id: summary
    type: transform
    name: Summary
    inputs:
      - from: nodes.post-linkedin.outputs.postUrl
        to: linkedinUrl
      - from: nodes.post-slack.outputs.messageTs
        to: slackTs
      - from: nodes.generate-card.outputs.firstImageUrl
        to: imageUrl
      - from: nodes.aggregate.outputs.stats
        to: stats
    outputs:
      - summary
    config:
      expression: |
        ({
          summary: {
            repo: inputs.stats?.name,
            stars: inputs.stats?.stars,
            linkedinUrl: inputs.linkedinUrl,
            slackPosted: !!inputs.slackTs,
            statsImage: inputs.imageUrl,
            ranAt: new Date().toISOString()
          }
        })
edges:
  - from: fetch-repo
    to: aggregate
  - from: fetch-prs
    to: aggregate
  - from: fetch-issues
    to: aggregate
  - from: aggregate
    to: write-update
  - from: write-update
    to: parse-update
  - from: parse-update
    to: generate-card
  - from: parse-update
    to: post-linkedin
  - from: parse-update
    to: post-slack
  - from: generate-card
    to: summary
  - from: post-linkedin
    to: summary
  - from: post-slack
    to: summary
