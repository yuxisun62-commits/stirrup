id: deploy-smoke-test
name: Deploy Smoke Test
version: "1.0"
description: |
  Minimum-viable end-to-end test for the GitHub + Launchmatic integration path.
  Exercises github-create-repo (with reuseIfExists), git-init-push (force),
  lm-create-project (teamId resolution + idempotency), and lm-quicklaunch
  (the real /api surface). No AI calls — runs in under a minute so we can
  iterate on integration bugs quickly.

params:
  - name: productName
    type: string
    required: false
    default: "stirrup-deploy-smoke"
    description: "Name used for the GitHub repo + Launchmatic service slug"
  - name: githubToken
    type: string
    required: false
    description: "GitHub token with repo creation permissions"
    service: github
  - name: githubOrg
    type: string
    required: false
    description: "GitHub org to create the repo under (leave blank for personal account)"
  - name: lmToken
    type: string
    required: false
    description: "Launchmatic API token"
    service: launchmatic

context:
  productName: "stirrup-deploy-smoke"
  githubOrg: ""

nodes:
  # 1. Produce a minimal Node.js web app as a scaffold-files marker string.
  # Single inline index.js + package.json is enough for Launchmatic to build
  # and deploy; no external deps, fast cold start.
  - id: gen-files
    type: transform
    name: "Generate Minimal App"
    inputs:
      - from: context.productName
        to: name
    outputs:
      - code
    config:
      expression: |
        ({
          code:
            '// === FILE: package.json ===\n' +
            '{\n' +
            '  "name": "' + inputs.name + '",\n' +
            '  "version": "0.0.1",\n' +
            '  "private": true,\n' +
            '  "main": "index.js",\n' +
            '  "scripts": { "start": "node index.js" },\n' +
            '  "engines": { "node": ">=20" }\n' +
            '}\n' +
            '// === FILE: index.js ===\n' +
            "const http = require('http');\n" +
            "const port = process.env.PORT || 3000;\n" +
            "const started = new Date().toISOString();\n" +
            "http.createServer((req, res) => {\n" +
            "  res.writeHead(200, { 'Content-Type': 'application/json' });\n" +
            "  res.end(JSON.stringify({\n" +
            "    service: '" + inputs.name + "',\n" +
            "    startedAt: started,\n" +
            "    path: req.url,\n" +
            "    ok: true,\n" +
            "  }));\n" +
            "}).listen(port, () => console.log('listening on ' + port));\n" +
            '// === FILE: README.md ===\n' +
            '# ' + inputs.name + '\n' +
            '\n' +
            'Generated by the Stirrup deploy-smoke-test template.\n'
        })

  # 2. Write the files to disk under a per-product subfolder so parallel
  # runs don't step on each other.
  - id: scaffold
    type: scaffold-files
    name: "Scaffold Files"
    inputs:
      - from: nodes.gen-files.outputs.code
        to: code
      - from: context.productName
        to: repoName
    outputs:
      - outputDir
      - filesWritten
    config:
      outputDir: "./deploy-smoke-output"

  # 3. Create (or reuse) the GitHub repo. reuseIfExists means the second
  # run with the same productName doesn't 422 on us.
  - id: create-repo
    type: github-create-repo
    name: "Create GitHub Repo"
    inputs:
      - from: context.productName
        to: name
      - from: context.githubOrg
        to: org
      - from: context.githubToken
        to: token
    outputs:
      - htmlUrl
      - cloneUrl
      - fullName
      - defaultBranch
      - reused
    config:
      isPrivate: false
      reuseIfExists: true

  # 4. Push the scaffold with --force so reused repos with prior history
  # accept the overwrite.
  - id: git-push
    type: git-init-push
    name: "Init + Push"
    inputs:
      - from: nodes.scaffold.outputs.outputDir
        to: dir
      - from: nodes.create-repo.outputs.htmlUrl
        to: remoteUrl
      - from: context.githubToken
        to: token
    outputs:
      - pushed
      - branch
      - filesCommitted
    config:
      commitMessage: "smoke test: initial scaffold"
      branch: main
      force: true

  # 5. Ensure a Launchmatic project exists. Uses the idempotent path —
  # on 409 it looks up the existing project by slug and returns its id.
  - id: ensure-lm-project
    type: lm-create-project
    name: "Ensure Launchmatic Project"
    inputs:
      - from: context.lmToken
        to: token
    outputs:
      - projectId
      - slug
      - name
    config:
      name: "Stirrup Smoke Tests"
      slug: stirrup-smoke-tests
    # If this node genuinely fails (not idempotent 409), let the deploy
    # node surface a clearer error downstream instead of aborting here.
    continueOnError: true

  # 6. Deploy the freshly-pushed repo. Uses projectId from the ensure node
  # when present, falls back to projectSlug otherwise. Retries on transient
  # failures; continueOnError so we still get a final summary.
  - id: deploy
    type: lm-quicklaunch
    name: "Deploy to Launchmatic"
    inputs:
      - from: nodes.create-repo.outputs.fullName
        to: repo
      - from: context.productName
        to: name
      - from: nodes.ensure-lm-project.outputs.projectId
        to: projectId
      - from: context.lmToken
        to: token
    outputs:
      - url
      - serviceId
      - deploymentId
      - status
    config:
      projectSlug: stirrup-smoke-tests
      branch: main
    retry:
      maxAttempts: 2
      backoffMs: 5000
      backoffMultiplier: 2
    continueOnError: true

  # 7. Collect a compact summary so the final state shows what worked.
  - id: summary
    type: transform
    name: "Summary"
    inputs:
      - from: nodes.create-repo.outputs.htmlUrl
        to: repoUrl
      - from: nodes.create-repo.outputs.reused
        to: repoReused
      - from: nodes.git-push.outputs.filesCommitted
        to: filesCommitted
      - from: nodes.ensure-lm-project.outputs.projectId
        to: projectId
      - from: nodes.deploy.outputs.url
        to: deployUrl
      - from: nodes.deploy.outputs.serviceId
        to: serviceId
      - from: nodes.deploy.outputs.status
        to: deployStatus
    outputs:
      - summary
    config:
      expression: |
        ({
          summary: {
            repo: { url: inputs.repoUrl, reused: inputs.repoReused, filesPushed: inputs.filesCommitted },
            launchmatic: {
              projectId: inputs.projectId || null,
              serviceId: inputs.serviceId || null,
              url: inputs.deployUrl || null,
              status: inputs.deployStatus || 'failed'
            },
            allGreen:
              !!inputs.repoUrl && !!inputs.projectId && !!inputs.serviceId && !!inputs.deployUrl
          }
        })

edges:
  - from: gen-files
    to: scaffold
  - from: scaffold
    to: git-push
  - from: create-repo
    to: git-push
  - from: git-push
    to: deploy
  - from: ensure-lm-project
    to: deploy
  - from: deploy
    to: summary
